<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TripTalk Hotel - Roleplay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-area="hotel" data-mode="conversation">
    <main class="app-shell">
      <section class="main-panel" aria-label="Hotel roleplay lesson">
        <header class="topbar">
          <div>
            <p class="kicker">Hotel / Roleplay</p>
            <h1>ホテル英会話</h1>
            <p class="topbar-copy">フロントの猫スタッフに英語で答える。</p>
          </div>
          <div class="xp-badge" aria-label="Total XP"><strong id="totalXp">0</strong><span>XP</span></div>
        </header>
        <nav class="area-nav" aria-label="Travel areas"><a href="index.html">カフェ</a><a class="active" href="hotel.html">ホテル</a><a href="airport.html">空港</a></nav>
        <nav class="mode-nav" aria-label="Learning pages"><a href="hotel.html">単語</a><a href="hotel-phrases.html">フレーズ</a><a class="active" href="hotel-roleplay.html">英会話</a></nav>
        <section class="cafe-stage" id="cafeStage" aria-label="Hotel lobby">
          <img id="interiorBack" class="interior-layer interior-back" src="assets/interiors/hotel/hotel-lobby-back.png" alt="" />
          <div class="barista" id="barista" aria-label="Hotel cat character"><img id="mamefukuImage" class="mamefuku-image" src="assets/characters/hotel-cat/hotel-cat.png" alt="Hotel concierge cat" /></div>
          <img id="interiorFront" class="interior-layer interior-front" src="" alt="" hidden />
        </section>
        <section class="lesson-card">
          <div class="lesson-head"><div><p class="label" id="modeLabel">Conversation</p><h2 id="promptTitle">Talk at the hotel desk</h2></div><button class="icon-button" id="soundButton" type="button" aria-label="Read English aloud" title="Read English aloud"><span aria-hidden="true">♪</span></button></div>
          <div class="question-box" id="questionBox" aria-live="polite"></div>
          <form class="answer-form" id="answerForm"><label for="answerInput" id="answerLabel">Your English</label><div class="answer-row"><input id="answerInput" name="answer" autocomplete="off" placeholder="Type your reply..." /><button type="submit">Send</button></div></form>
          <div class="choice-grid" id="choiceGrid" aria-label="Answer choices"></div>
          <section class="feedback" id="feedback" aria-live="polite"><strong>Ready</strong><span>猫スタッフの質問を聞いて、短く答えよう。</span></section>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
