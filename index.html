<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TripTalk Cafe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="main-panel" aria-label="Cafe learning area">
        <header class="topbar">
          <div>
            <p class="kicker">Cafe Area MVP</p>
            <h1>TripTalk Cafe</h1>
          </div>
          <div class="xp-badge" aria-label="Total XP">
            <strong id="totalXp">0</strong>
            <span>XP</span>
          </div>
        </header>

        <section class="cafe-stage" id="cafeStage" aria-label="Cafe room">
          <div class="wall-art"></div>
          <div class="shelf shelf-left"></div>
          <div class="shelf shelf-right"></div>
          <div class="counter">
            <div class="pastries"></div>
            <div class="machine"></div>
            <div class="cup-row"></div>
          </div>
          <div class="barista" id="barista" aria-label="Barista character">
            <div class="barista-hair"></div>
            <div class="barista-face">
              <span></span>
            </div>
            <div class="barista-body">
              <div class="apron"></div>
            </div>
          </div>
          <div class="stage-label">
            <span id="cafeLevelLabel">Cafe Lv.1</span>
            <strong id="baristaTitle">Trainee Barista</strong>
          </div>
        </section>

        <section class="progress-board">
          <div class="meter-group">
            <div class="meter-label">
              <span id="nextRewardText">Next: Table seats at 30 XP</span>
              <span id="xpMeterText">0 / 120</span>
            </div>
            <div class="meter">
              <span id="xpBar"></span>
            </div>
          </div>
          <div class="stat-grid">
            <div>
              <strong id="clearCount">0</strong>
              <span>clears</span>
            </div>
            <div>
              <strong id="itemCount">0</strong>
              <span>unlocks</span>
            </div>
            <div>
              <strong id="phraseCount">0</strong>
              <span>phrases</span>
            </div>
          </div>
        </section>

        <nav class="mode-tabs" aria-label="Learning modes" id="modeTabs"></nav>

        <section class="lesson-card">
          <div class="lesson-head">
            <div>
              <p class="label" id="modeLabel">Vocabulary</p>
              <h2 id="promptTitle">Start learning cafe English</h2>
            </div>
            <button class="icon-button" id="soundButton" type="button" aria-label="Read English aloud" title="Read English aloud">
              <span aria-hidden="true">♪</span>
            </button>
          </div>

          <div class="question-box" id="questionBox" aria-live="polite"></div>

          <form class="answer-form" id="answerForm">
            <label for="answerInput" id="answerLabel">Your answer</label>
            <div class="answer-row">
              <input id="answerInput" name="answer" autocomplete="off" placeholder="Type your answer..." />
              <button type="submit">Send</button>
            </div>
          </form>

          <div class="choice-grid" id="choiceGrid" aria-label="Answer choices"></div>

          <section class="feedback" id="feedback" aria-live="polite">
            <strong>Ready</strong>
            <span>英単語・英文・英会話を練習してカフェを育てよう。</span>
          </section>
        </section>
      </section>

      <aside class="side-panel" aria-label="Cafe progress">
        <section class="side-card">
          <p class="kicker">Cafe upgrades</p>
          <h2>学習でお店が育つ</h2>
          <div class="upgrade-list" id="upgradeList"></div>
        </section>

        <section class="side-card">
          <div class="section-head">
            <h2>Phrase bank</h2>
            <button id="resetButton" type="button">Reset</button>
          </div>
          <div id="phraseBank"></div>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
