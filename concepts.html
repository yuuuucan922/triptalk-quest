<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TripTalk Concepts</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17201d;
        --muted: #65716d;
        --paper: #fff8ec;
        --line: #dee5dc;
        --green: #176449;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        color: var(--ink);
        background: var(--paper);
      }

      main {
        width: min(1080px, calc(100% - 24px));
        margin: 0 auto;
        padding: 20px 0 32px;
      }

      header,
      .section-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1;
      }

      h1 {
        font-size: clamp(1.8rem, 7vw, 3.4rem);
      }

      h2 {
        font-size: clamp(1.25rem, 5vw, 2rem);
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--green);
        font-weight: 800;
      }

      .concept-card {
        background: white;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        box-shadow: 0 18px 44px rgba(36, 43, 38, 0.14);
      }

      .concept-card + .section-heading,
      .note + .section-heading {
        margin-top: 28px;
      }

      .concept-card img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 6px;
        background: #111;
      }

      .note {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #eef6f1;
        border: 1px solid #cfe4d7;
      }

      .back {
        display: inline-block;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Concepts</h1>
          <p>カフェ内装の方向性と重なり確認ページ</p>
        </div>
      </header>

      <div class="section-heading">
        <div>
          <h2>Lv1 重なり検証</h2>
          <p>背景レイヤー、豆福、前面カウンターの順に重ねた検証画像です。</p>
        </div>
      </div>

      <section class="concept-card">
        <img src="assets/concepts/cafe-lv1-layer-preview.png" alt="Cafe level 1 layer overlap preview" />
      </section>

      <section class="note">
        <strong>確認ポイント</strong>
        <p>豆福がカウンターテーブルの後ろに立っているように見えるかを確認します。OKなら、このレイヤー構造をアプリ本体のLv1表示へ反映します。</p>
      </section>

      <div class="section-heading">
        <div>
          <h2>内装方向性</h2>
          <p>Lv1からLv5までの街カフェ風イメージです。</p>
        </div>
      </div>

      <section class="concept-card">
        <img src="assets/concepts/cafe-interior-concept.png" alt="Cafe interior concept comparison" />
      </section>

      <section class="note">
        <strong>確認ポイント</strong>
        <p>実装素材では文字なし、説明ラベルなし、背景・豆福・前面カウンターを別画像として作ります。</p>
      </section>

      <a class="back" href="index.html">アプリに戻る</a>
    </main>
  </body>
</html>
