<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TripTalk Airport - Words</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-area="airport" data-mode="vocabulary">
    <main class="app-shell">
      <section class="main-panel" aria-label="Airport vocabulary lesson">
        <header class="topbar">
          <div>
            <p class="kicker">Airport / Words</p>
            <h1>空港単語</h1>
            <p class="topbar-copy">搭乗手続きやゲートで使う空港英単語を覚える。</p>
          </div>
          <div class="xp-badge" aria-label="Total XP">
            <strong id="totalXp">0</strong>
            <span>XP</span>
          </div>
        </header>

        <nav class="area-nav" aria-label="Travel areas">
          <a href="index.html">カフェ</a>
          <a href="hotel.html">ホテル</a>
          <a class="active" href="airport.html">空港</a>
        </nav>

        <nav class="mode-nav" aria-label="Learning pages">
          <a class="active" href="airport.html">単語</a>
          <a href="airport-phrases.html">フレーズ</a>
          <a href="airport-roleplay.html">英会話</a>
        </nav>

        <section class="cafe-stage" id="cafeStage" aria-label="Airport terminal">
          <img id="interiorBack" class="interior-layer interior-back" src="assets/interiors/airport/airport-terminal-back.png" alt="" />
          <div class="barista" id="barista" aria-label="Airport penguin character">
            <img id="mamefukuImage" class="mamefuku-image" src="assets/characters/airport-penguin/airport-penguin.png" alt="Airport staff penguin" />
          </div>
          <img id="interiorFront" class="interior-layer interior-front" src="" alt="" hidden />
        </section>

        <section class="lesson-card">
          <div class="lesson-head">
            <div>
              <p class="label" id="modeLabel">Vocabulary</p>
              <h2 id="promptTitle">Airport word quiz</h2>
            </div>
            <button class="icon-button" id="soundButton" type="button" aria-label="Read English aloud" title="Read English aloud">
              <span aria-hidden="true">♪</span>
            </button>
          </div>

          <div class="question-box" id="questionBox" aria-live="polite"></div>

          <form class="answer-form" id="answerForm">
            <label for="answerInput" id="answerLabel">Your answer</label>
            <div class="answer-row">
              <input id="answerInput" name="answer" autocomplete="off" placeholder="Type your answer..." />
              <button type="submit">Send</button>
            </div>
          </form>

          <div class="choice-grid" id="choiceGrid" aria-label="Answer choices"></div>

          <section class="feedback" id="feedback" aria-live="polite">
            <strong>Ready</strong>
            <span>空港英語を1つずつ覚えよう。</span>
          </section>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
